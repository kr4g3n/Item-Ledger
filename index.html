<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Item Ledger</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#2b231c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Item Ledger" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
:root {
  --paper: #f1e7d0;
  --paper-dim: #e8dbb9;
  --panel: #fbf6ea;
  --ink: #2b231c;
  --ink-soft: #5b4f3f;
  --ink-faint: #8a7d68;
  --rule: #c2ad7e;
  --rule-light: #ddcc9e;
  --brass: #8a6a2e;
  --brass-bright: #a87f1f;
  --wax: #7a2e1f;
  --wax-bright: #9c3a26;
  --moss: #44552f;
  --moss-bright: #56693c;
  --font-display: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
  --font-body: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --radius: 6px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

button {
  font-family: var(--font-body);
  cursor: pointer;
}

input, select, textarea {
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--panel);
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 5px 7px;
  font-size: 14px;
}

input:focus, select:focus, textarea:focus {
  outline: 2px solid var(--brass-bright);
  outline-offset: 1px;
}

input[type="number"] {
  font-variant-numeric: tabular-nums;
  text-align: right;
}

/* ---------- Top bar ---------- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: var(--ink);
  color: var(--paper);
  border-bottom: 3px double var(--brass);
  flex-wrap: wrap;
  gap: 10px;
}

.topbar h1 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: normal;
  letter-spacing: 0.02em;
  margin: 0;
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.topbar h1 .mark {
  color: #d9b65a;
  font-size: 24px;
}

.topbar .sub {
  font-size: 12px;
  color: #c9bd9e;
  margin-top: 2px;
}

.topbar-actions {
  display: flex;
  gap: 8px;
}

.btn {
  border: 1px solid transparent;
  border-radius: var(--radius);
  padding: 7px 13px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  background: var(--panel);
  color: var(--ink);
  border: 1px solid var(--rule);
}

.btn:hover { background: #fff; }

.btn-ghost {
  background: transparent;
  color: var(--paper);
  border: 1px solid #5a4f38;
}
.btn-ghost:hover { background: rgba(255,255,255,0.08); }

.btn-brass { background: var(--brass); color: #fff8e8; border-color: var(--brass); }
.btn-brass:hover { background: var(--brass-bright); }

.btn-moss { background: var(--moss); color: #f3f6ec; border-color: var(--moss); }
.btn-moss:hover { background: var(--moss-bright); }

.btn-wax { background: transparent; color: var(--wax); border: 1px solid var(--wax); }
.btn-wax:hover { background: var(--wax); color: #fff; }

.btn-sm { padding: 4px 9px; font-size: 12px; }

/* ---------- Layout ---------- */
.app-body {
  display: flex;
  flex: 1;
  min-height: 0;
}

.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--paper-dim);
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
}

.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--rule);
}
.sidebar-search input { width: 100%; }

.sidebar-new {
  padding: 0 12px 12px;
}
.sidebar-new button { width: 100%; }

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0 16px;
}

.sidebar-group-heading {
  font-family: var(--font-display);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  padding: 10px 14px 4px;
}

.sidebar-item {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  padding: 6px 14px;
  font-size: 13.5px;
  color: var(--ink-soft);
}
.sidebar-item:hover { background: rgba(0,0,0,0.04); color: var(--ink); }
.sidebar-item.active {
  background: var(--panel);
  border-left-color: var(--brass);
  color: var(--ink);
  font-weight: 600;
}

.main {
  flex: 1;
  overflow-y: auto;
  padding: 22px 26px 60px;
}

.empty-state {
  color: var(--ink-faint);
  font-style: italic;
  padding: 40px;
  text-align: center;
}

/* ---------- Editor ---------- */
.editor-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}

.item-name-input {
  font-family: var(--font-display);
  font-size: 26px;
  border: none;
  background: transparent;
  border-bottom: 2px solid var(--rule);
  padding: 2px 2px 4px;
  width: 100%;
  max-width: 480px;
}
.item-name-input:focus { outline: none; border-bottom-color: var(--brass-bright); }

.field-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px 14px;
  margin-bottom: 18px;
  padding: 14px;
  background: var(--panel);
  border: 1px solid var(--rule-light);
  border-radius: var(--radius);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-faint);
}
.field-checkbox {
  flex-direction: row;
  align-items: center;
  gap: 6px;
  justify-content: flex-start;
  margin-top: auto;
}
.field-checkbox label { text-transform: none; font-size: 13px; color: var(--ink-soft); }

.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 18px;
}
@media (max-width: 760px) {
  .panels { grid-template-columns: 1fr; }
}

.panel {
  background: var(--panel);
  border: 1px solid var(--rule-light);
  border-radius: var(--radius);
  padding: 12px 14px;
}

.panel-title {
  font-family: var(--font-display);
  font-size: 15px;
  margin: 0 0 8px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.grid-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.grid-table th {
  text-align: right;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  border-bottom: 1px solid var(--rule);
  padding: 3px 6px;
  font-weight: 600;
}
.grid-table th:first-child, .grid-table td:first-child { text-align: left; }
.grid-table td {
  padding: 4px 6px;
  border-bottom: 1px solid var(--rule-light);
  vertical-align: middle;
}
.grid-table td.num, .grid-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
.grid-table input[type="number"] { width: 78px; padding: 3px 5px; font-size: 13px; }
.row-name { color: var(--ink); }
.row-del {
  background: none; border: none; color: var(--wax); font-size: 15px; line-height: 1;
  padding: 2px 4px; border-radius: 3px;
}
.row-del:hover { background: rgba(122,46,31,0.12); }

.add-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.add-row select { flex: 1; min-width: 120px; }
.add-row input[type="number"] { width: 70px; }
.add-row-error { color: var(--wax); font-size: 12px; width: 100%; }

.panel-subtotal {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--rule);
}
.panel-subtotal .val { font-variant-numeric: tabular-nums; font-weight: 600; }

.totals-strip {
  background: var(--ink);
  color: var(--paper);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
.totals-strip .t-item { display: flex; flex-direction: column; gap: 2px; }
.totals-strip .t-label {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em; color: #c9bd9e;
}
.totals-strip .t-val { font-size: 17px; font-variant-numeric: tabular-nums; }
.totals-strip input[type="number"] {
  background: rgba(255,255,255,0.08); border: 1px solid #5a4f38; color: var(--paper);
  font-size: 16px; width: 100%;
}
.totals-strip .t-final {
  border: 2px double #d9b65a;
  border-radius: var(--radius);
  padding: 6px 10px;
}
.totals-strip .t-final .t-val { color: #f4dd9a; font-size: 19px; font-weight: 600; }

.catalogue-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  background: var(--panel);
  border: 1px solid var(--rule-light);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 18px;
  font-size: 13px;
}
.catalogue-strip .c-label { color: var(--ink-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
.catalogue-strip .c-val { font-variant-numeric: tabular-nums; font-size: 15px; color: var(--brass); font-weight: 600; }

.desc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 760px) { .desc-grid { grid-template-columns: 1fr; } }
.desc-grid .field label { margin-bottom: 2px; }
.desc-grid textarea { width: 100%; min-height: 90px; resize: vertical; font-size: 13px; }

.flash {
  animation: flashbg 0.6s ease-out;
}
@keyframes flashbg {
  0% { background: rgba(217,182,90,0.35); }
  100% { background: transparent; }
}

.stale-banner {
  background: #f5e3c9;
  border: 1px solid var(--brass);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 16px;
  color: var(--ink-soft);
}

@media (max-width: 640px) {
  .app-body { flex-direction: column; }
  .sidebar { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--rule); }
  .main { padding: 16px; }
}

/* ===================== Multi-screen additions ===================== */
.world-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  background: #241d17;
  border-bottom: 1px solid #3a3026;
  flex-wrap: wrap;
}
.world-bar .world-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #b3a888;
}
.world-bar select {
  background: #fbf6ea; min-width: 160px; font-weight: 600;
}

/* Home */
.home-wrap { max-width: 1000px; margin: 0 auto; padding: 30px 24px 60px; }
.home-head { margin-bottom: 24px; }
.home-head h2 {
  font-family: var(--font-display); font-size: 30px; font-weight: normal; margin: 0 0 4px;
}
.home-sub { color: var(--ink-faint); margin: 0; font-size: 14px; }

.tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}
.tile {
  display: flex; flex-direction: column; gap: 6px; align-items: flex-start;
  text-align: left; background: var(--panel); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 18px 18px 16px; cursor: pointer;
  transition: transform 0.08s ease, box-shadow 0.12s ease, border-color 0.12s ease;
}
.tile:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(43,35,28,0.14); border-color: var(--brass); }
.tile-title { font-family: var(--font-display); font-size: 19px; color: var(--ink); }
.tile-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.4; }
.tile-stat {
  margin-top: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--brass); font-weight: 600;
}

.home-foot {
  margin-top: 28px; padding-top: 18px; border-top: 1px solid var(--rule-light);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.home-foot .btn-ghost { color: var(--ink-soft); border-color: var(--rule); }
.home-foot .btn-ghost:hover { background: rgba(0,0,0,0.04); }
.home-foot-note { font-size: 12px; color: var(--ink-faint); flex: 1; min-width: 220px; }

/* Screen head (sub-tables + catalogue) */
.screen-head {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 24px; border-bottom: 1px solid var(--rule-light);
}
.screen-head .btn-ghost { color: var(--ink-soft); border-color: var(--rule); }
.screen-head .btn-ghost:hover { background: rgba(0,0,0,0.04); }
.screen-head h2 { font-family: var(--font-display); font-size: 22px; font-weight: normal; margin: 0; }

.catalogue-body { display: flex; flex: 1; min-height: 0; height: calc(100vh - 165px); }

.table-screen { max-width: 920px; margin: 0 auto; padding: 22px 24px 60px; }
.screen-note { color: var(--ink-soft); font-size: 13.5px; line-height: 1.5; margin: 0 0 16px; max-width: 70ch; }

.data-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 16px; background: var(--panel); border: 1px solid var(--rule-light); border-radius: var(--radius); overflow: hidden; }
.data-table th {
  text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink-faint); padding: 9px 12px; border-bottom: 1.5px solid var(--rule); background: var(--paper-dim);
}
.data-table th.num, .data-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--rule-light); }
.data-table tr:last-child td { border-bottom: none; }
.dt-name { font-weight: 600; color: var(--ink); }
.dt-used { color: var(--ink-soft); }
.dt-actions { text-align: right; white-space: nowrap; }
.dt-actions .btn { margin-left: 5px; }

.active-pill {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  background: var(--moss); color: #f3f6ec; padding: 1px 7px; border-radius: 9px; margin-left: 6px;
}

/* Dialog */
.dialog-overlay {
  display: none; position: fixed; inset: 0; background: rgba(30,24,18,0.55);
  align-items: center; justify-content: center; z-index: 100; padding: 20px;
}
.dialog {
  background: var(--paper); border: 1px solid var(--brass); border-radius: var(--radius);
  width: 100%; max-width: 420px; box-shadow: 0 18px 50px rgba(0,0,0,0.35);
  display: flex; flex-direction: column; max-height: 90vh;
}
.dialog-wide { max-width: 680px; }
.dialog-head {
  font-family: var(--font-display); font-size: 18px; padding: 14px 18px;
  border-bottom: 2px double var(--rule); color: var(--ink);
}
.dialog-body { padding: 16px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.dialog-body .field { display: flex; flex-direction: column; gap: 4px; }
.dialog-body .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); }
.dialog-body input, .dialog-body select, .dialog-body textarea { width: 100%; }
.dialog-body textarea { min-height: 70px; resize: vertical; }
.dlg-hint { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; margin: 0; }
.dialog-foot {
  padding: 12px 18px; border-top: 1px solid var(--rule-light);
  display: flex; justify-content: flex-end; gap: 8px;
}
.world-table { margin-top: 4px; }
.world-table td { vertical-align: middle; }
.world-add-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

@media (max-width: 640px) {
  .catalogue-body { flex-direction: column; height: auto; }
  .catalogue-body .sidebar { width: 100%; max-height: 220px; border-right: none; border-bottom: 1px solid var(--rule); }
  .dt-actions .btn { margin: 2px 0 2px 4px; }
}

/* ===================== List page (catalogue) ===================== */
.list-page { max-width: 940px; margin: 0 auto; padding: 18px 24px 60px; }
.list-toolbar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
}
.list-search { flex: 1; min-width: 180px; }
.list-toolbar-actions { display: flex; gap: 8px; }
.btn:disabled { opacity: 0.45; cursor: default; }
.btn:disabled:hover { background: var(--panel); }

.list-table-wrap {
  background: var(--panel); border: 1px solid var(--rule-light); border-radius: var(--radius); overflow: hidden;
}
.list-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.list-table thead th {
  text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink-faint); padding: 9px 14px; border-bottom: 1.5px solid var(--rule); background: var(--paper-dim);
  position: sticky; top: 0;
}
.list-table th.num, .list-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.list-cat-row td {
  font-family: var(--font-display); font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--brass); background: var(--paper-dim); padding: 6px 14px;
  border-bottom: 1px solid var(--rule-light); border-top: 1px solid var(--rule-light);
}
.list-row { cursor: pointer; }
.list-row td { padding: 8px 14px; border-bottom: 1px solid var(--rule-light); }
.list-row:hover td { background: rgba(138,106,46,0.06); }
.list-row.selected td { background: rgba(138,106,46,0.16); }
.list-row.selected .lr-name { font-weight: 600; }
.lr-name { color: var(--ink); }
.lr-unit { color: var(--ink-soft); }
.lr-value { color: var(--brass); font-weight: 600; }

/* ===================== Editor page ===================== */
.editor-head-bar { justify-content: flex-start; gap: 14px; }
.editor-head-bar h2 { flex: 1; }
.editor-head-actions { display: flex; gap: 8px; }
.editor-page { max-width: 1000px; margin: 0 auto; padding: 20px 24px 70px; }
.editor-page .item-name-input { max-width: 100%; }

@media (max-width: 640px) {
  .list-toolbar { flex-direction: column; align-items: stretch; }
  .list-toolbar-actions { justify-content: stretch; }
  .list-toolbar-actions .btn { flex: 1; }
  .editor-head-bar { flex-wrap: wrap; }
  .editor-head-actions { width: 100%; }
  .editor-head-actions .btn { flex: 1; }
}

/* ===================== Editor layout v2 ===================== */
.desc-top { margin-bottom: 18px; }
.field-grid-slim {
  display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap;
  padding: 12px 14px; margin-bottom: 18px;
}
.field-grid-slim .field { min-width: 180px; }

.totals-block {
  background: var(--panel); border: 1px solid var(--rule-light);
  border-radius: var(--radius); padding: 14px; margin-bottom: 18px;
}
.totals-block .totals-strip { margin-bottom: 14px; }
.sale-fields {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px 14px; padding-bottom: 14px; margin-bottom: 4px;
  border-bottom: 1px solid var(--rule-light);
}
.sale-fields .field { display: flex; flex-direction: column; gap: 3px; }
.sale-fields label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-faint); }
.totals-block .catalogue-strip { background: transparent; border: none; padding: 12px 0 0; margin: 0; }

.stub-tag {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
  background: #e6d3a8; color: #6b5320; padding: 1px 7px; border-radius: 9px; margin-left: 6px;
  vertical-align: middle;
}

/* ===================== Editor layout v3 ===================== */
/* De-highlight the totals strip inside the editor: plain, like the rest */
.totals-block .totals-strip {
  background: transparent;
  color: var(--ink);
  border: none;
  border-radius: 0;
  padding: 0 0 14px;
  border-bottom: 1px solid var(--rule-light);
}
.totals-block .totals-strip .t-label { color: var(--ink-faint); }
.totals-block .totals-strip .t-val { color: var(--ink); }
.totals-block .totals-strip input[type="number"] {
  background: var(--panel); border: 1px solid var(--rule); color: var(--ink);
}
.totals-block .totals-strip .t-final {
  border: none; border-radius: 0; padding: 0;
}
.totals-block .totals-strip .t-final .t-val { color: var(--ink); font-weight: 700; }

.desc-top-single { display: block; }
.desc-top-single textarea { min-height: 70px; }
.desc-bottom { display: block; margin-top: 18px; }
.desc-bottom textarea { min-height: 90px; }

/* Sale fields sit above the totals now; keep a divider under them too */
.totals-block .sale-fields { border-top: none; padding-top: 0; }

/* ===================== Collapsible list categories ===================== */
.list-cat-row td { padding: 0; }
.list-cat-toggle {
  width: 100%; text-align: left; background: var(--paper-dim); border: none;
  font-family: var(--font-display); font-size: 12.5px; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--brass); padding: 7px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--rule-light); border-top: 1px solid var(--rule-light);
}
.list-cat-toggle:hover { background: #e6d8b4; }
.list-cat-caret { display: inline-block; width: 12px; transition: transform 0.12s ease; color: var(--ink-faint); }
.list-cat-toggle.collapsed .list-cat-caret { transform: rotate(-90deg); }
.list-cat-count { color: var(--ink-faint); font-weight: normal; letter-spacing: 0; text-transform: none; font-size: 12px; }

/* ===================== List column widths ===================== */
/* Description takes the slack; unit/value/weight sit narrow and close together */
.list-table th:first-child, .list-table td.lr-name { width: auto; }
.list-table th:nth-child(2), .list-table td.lr-unit { width: 110px; white-space: nowrap; }
.list-table th:nth-child(3), .list-table td.lr-value { width: 90px; padding-left: 6px; padding-right: 10px; }
.list-table th:nth-child(4), .list-table td.lr-weight { width: 72px; padding-left: 6px; padding-right: 14px; }
.list-table th:nth-child(2), .list-table th:nth-child(3), .list-table th:nth-child(4) { padding-left: 6px; }

/* ===================== List: category-group tier ===================== */
.list-group-row td { padding: 0; }
.list-group-toggle {
  width: 100%; text-align: left; background: var(--ink); color: var(--paper);
  border: none; font-family: var(--font-display); font-size: 14px;
  letter-spacing: 0.04em; padding: 9px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #3a3026;
}
.list-group-toggle:hover { background: #322a20; }
.list-group-toggle .list-cat-caret { color: #c9bd9e; }
.list-group-toggle.collapsed .list-cat-caret { transform: rotate(-90deg); }
.list-group-toggle .list-cat-count { color: #c9bd9e; font-weight: normal; font-family: var(--font-body); font-size: 12px; }

/* Indented (grouped) category headers and their item rows */
.list-cat-toggle.indented { padding-left: 30px; }
.list-row.indented .lr-name { padding-left: 28px; }

\n\nThen the fabric must be fulled (washed in boiling water, and dried to shrink it to size) this takes a just under a day and a half (1.446 days)\n\n0.2376 days setup + 0.972 days weaving + 1.446 days fulling = 2.6556 days total crafting time.\n\nUsing the formulae above we calculate \nWarp yardage: ((((360*1.35)+18)*66)*24)/36 = 22,176 yards\nWeft yardage: (((60*1.35)*(360*1.35))*24)/36 = 26,244 yards.\n22,176 + 26,244 = 48,420 total yards.\n48,420 yards / 1,500yds/lb = 32.28lbs total material weight. \n\nLoom waste = ((26.6 inches * 66 inches) * 24 threads per inch) / 36 inches = 1,170 yards \n1,170 yards / 1,500 yds/lb = 0.78lbs\n32.28lbs \u2013 0.78lbs = 31.5lbs finished item weight. \n\n10 yards (30 feet) finished length * 5 feet finished width = 150 square feet."},{"id":53,"name":"Sackcloth","categoryId":9,"isMagic":false,"weightLbs":21,"minSaleQty":5,"saleUnitId":5,"baseMeasureQty":150,"markupAmount":0,"description":"A rough, open-weave utility cloth made from coarse hemp yarn. Strong, breathable, and inexpensive, it is used for sacks, bale wrapping, packing cloth, storage bags, animal bedding covers, rough aprons, and other heavy-duty farm or trade goods.","craftingDescription":"Sackcloth is woven with Coarse Yarn on a 66\u201d inch loom at 13 threads per inch. \n\nIt takes 1 Weaver, approximately 0.1188 days to set up the loom.\n66inches loom width * 13 threads per inch * 0.00015 days per warp thread = 0.1188 days to set up the loom.\n\nWeaving at 20 rows per minute with 13 threads per inch = 1 minute / 20 threads per minute * 13 threads per inch = 0.65 minutes per inch.\n360 inches * 1.1 = 396 inches warp length\n396 inches * 0.65 minutes = 257.4 minutes.\n257.4 minutes / 600 = 0.429 days weave time.\n\nWhile sackcloth does not need fulling after weaving, it does need washing and drying, and this takes about 0.8849 days.\n\n0.1188 days loom set up + 0.429 days weave time + 0.1332 days washing and drying = 0.681 days total crafting time.\n\nWarp yardage: ((((360*1.1)+18)*66)*13)/36 = 9,867 yards \nWeft yardage: ((60*1.1)*(360*1.1)*13)/36 = 9,438 yards. \n9,867 + 9,438 = 19,305 total yards.\n19,305 yards / 900yds/lb = 21.45bs total material weight. \n\nLoom waste = ((17 inches * 66 inches) * 13 threads per inch) / 36 inches = 405.17 yards \n405.17 yards / 900yds/lb = 0.4502lbs\n21.45lbs \u2013 0.4502lbs = 21lbs \u2013 finished item weight. \n10 yards (30 feet) finished length * 5 feet finished width = 150 square feet."},{"id":54,"name":"Sailcloth","categoryId":9,"isMagic":false,"weightLbs":21.75,"minSaleQty":1,"saleUnitId":5,"baseMeasureQty":150,"markupAmount":0,"description":"Strong tightly woven medium-hemp cloth for sails, tents, awnings, wagon covers, tarps, and weather-exposed gear.","craftingDescription":"Sailcloth is woven with Medium Yarn on a 66\u201d inch loom at 18 threads per inch. \n\nIt takes 1 Weaver, approximately 0.1782 days to set up the loom.\n66inches loom width * 18 threads per inch * 0.00015 days per warp thread = 0.1782 days to set up the loom.\n\nWeaving at 20 rows per minute with 18 threads per inch = 1 minute / 20 threads per minute * 18 threads per inch = 0.9 minutes per inch.\n360 inches * 1.1 = 396 inches warp length\n396 inches * 0.9 minutes = 356.4 minutes.\n356..4 minutes / 600 = 0.594 days weave time.\n\nWhile sackcloth does not need fulling after weaving, it does need washing and drying, and this takes about 0.8916 days.\n\n0.1782 days loom set up + 0.594 days weave time + 0.4316 days washing and drying = 1.2038 days total crafting time.\n\nWarp yardage: ((((360*1.1)+18)*66)*18)/36 = 13,662 yards \nWeft yardage: ((60*1.1)*(360*1.1)*18)/36 = 13,068 yards. \n13,662yds + 13,068yds = 26,730 total yards.\n26,730yds / 1,200yds/lb = 22.275lbs total material weight. \n\nLoom waste = ((19.09 inches * 66 inches) * 18 threads per inch) / 36 inches = 630 yards \n630 yards / 1,200yds/lb = 0.525lbs\n22.275lbs \u2013 0.525lbs = 21.75lbs \u2013 finished item weight. \n10 yards (30 feet) finished length * 5 feet finished width = 150 square feet."},{"id":55,"name":"Canvas","categoryId":9,"isMagic":false,"weightLbs":19.5,"minSaleQty":1,"saleUnitId":5,"baseMeasureQty":150,"markupAmount":0,"description":"A strong, heavy utility cloth woven from hemp yarn on a 66-inch loom at 16 threads per inch. Tough and weather-resistant, it is used for packs, covers, tents, wagon sheets, work aprons, tarps, and reinforced gear.","craftingDescription":"Canvas is woven with Medium Yarn on a 66\u201d inch loom at 16 threads per inch. \n\nIt takes 1 Weaver, approximately 0.1584 days to set up the loom.\n66inches loom width * 16 threads per inch * 0.00015 days per warp thread = 0.1584 days to set up the loom.\n\nWeaving at 20 rows per minute with 16 threads per inch = 1 minute / 20 threads per minute * 16 threads per inch = 0.8 minutes per inch.\n360 inches * 1.1 = 396 inches warp length\n396 inches * 0.8 minutes = 316.8 minutes.\n316.8 minutes / 600 = 0.528 days weave time.\n\nWhile canvas does not need fulling after weaving, it does need washing and drying, and this takes about 0.8916 days.\n\n0.1584 days loom set up + 0.528 days weave time + 1.3836 days washing and drying = 2.07 days total crafting time.\n\nWarp yardage: ((((360*1.1)+18)*66)*16)/36 = 12,144 yards \nWeft yardage: ((60*1.1)*(360*1.1)*16)/36 = 11,616 yards. \n12,144yds + 11,616yds = 23,760 total yards.\n23,760yds / 1,200yds/lb = 19.8lbs total material weight. \n\nLoom waste = ((12.27 inches * 66 inches) * 16 threads per inch) / 36 inches = 359.92 yards \n528 yards / 1,200yds/lb = 0.3lbs\n19.8lbs \u2013 0.3lbs = 19.5lbs \u2013 finished item weight. \n10 yards (30 feet) finished length * 5 feet finished width = 150 square feet."},{"id":56,"name":"Linen","categoryId":9,"isMagic":false,"weightLbs":14.4,"minSaleQty":5,"saleUnitId":5,"baseMeasureQty":150,"markupAmount":0,"description":"A smooth, breathable cloth woven from fine flax yarn. Light, strong, and comfortable against the skin, it is commonly used for shirts, shift 59,"name":"Ore (Iron)","categoryId":1,"isMagic":false,"weightLbs":1,"minSaleQty":1,"saleUnitId":2,"baseMeasureQty":1,"markupAmount":0,"description":"A heavy mineral rock containing usable iron, mined from the earth and smelted in a furnace to produce bloom iron or pig iron. It is the basic raw material for making wrought iron, steel, tools, weapons, nails, fittings, armour, and other iron goods.","craftingDescription":"Iron ore is mined at the rate of 20lbs per person per day, or 1lb/30minutes.  This includes the time taken to haul the ore out of the mine and transport locally."},{"id":60,"name":"Ingot - Iron","categoryId":3,"isMagic":false,"weightLbs":40,"minSaleQty":1,"saleUnitId":1,"baseMeasureQty":40,"markupAmount":0,"description":"A small rectangular smelted iron bar measuring roughly 8 x 1 x 0.45 inches, Used as trade stock for smithing tools, nails, fittings, weapons, armour pieces, and hardware.","craftingDescription":"Iron Ingots are smelted from Iron Ore in a bloomery. The bloomery would be staffed by 4 smelters and would produce approximately 40lbs of iron ingots in 0.95 days, using 50lbs of Iron Ore, and 60lbs of Charcoal."},{"id":61,"name":"Ingot - Steel","categoryId":3,"isMagic":false,"weightLbs":25,"minSaleQty":1,"saleUnitId":1,"baseMeasureQty":25,"markupAmount":0,"description":"A small refined steel bar made from iron with controlled carbon content, and measuring 8 x 1 x 0.45 inches. Suitable for forging blades, tools, springs, fittings, armour pieces, and high-quality metalwork.","craftingDescription":"Steel Ingots take a team of 4 smelters a further 2.05 days of work, 30lbs of iron ingots, and another 60lbs of charcoal (some for heat, and some to be mixed with the metal) to produce 25lbs of steel"},{"id":62,"name":"Dagger","categoryId":10,"isMagic":false,"weightLbs":1,"minSaleQty":1,"saleUnitId":1,"baseMeasureQty":1,"markupAmount":0,"description":"A short, double-edged blade designed for close combat, utility cutting, and personal defence. Light enough to carry at the belt or boot, it is commonly used by soldiers, travellers, rogues, hunters, and townsfolk as both a weapon and a practical sidearm.","craftingDescription":"Dagger takes a competent Smith 1.84 days to craft using 1lb Steel Ingot, 40lbs charcoal, and 0.25 square feet of Buckskin Leather"},{"id":63,"name":"Iron Pyrite","categoryId":1,"isMagic":false,"weightLbs":30,"minSaleQty":30,"saleUnitId":2,"baseMeasureQty":30,"markupAmount":0,"description":"A small, exceptionally heavy parcel of unrefined mineral ore. These hand-gathered nodules are brassy-gold in color, showing a bright metallic glint when held to the light. The parcel consists of approximately15 fist-sized chunks.","craftingDescription":"Gathered by foraging along cliffsides and hills, takes about 2.5 hours to forage 30lbs of pyrite chunks"},{"id":64,"name":"Crystals - Green Vitriol (Copperas)","categoryId":3,"isMagic":false,"weightLbs":5,"minSaleQty":0.25,"saleUnitId":2,"baseMeasureQty":5,"markupAmount":0,"description":"Translucent, glass-like crystals with a striking pale, sea-green hue. \nThey form in clustered, needle-like structures or dense, crusty blocks that resemble rock candy. Also known historically as copperas or melanterite , these mineral crystals are highly sensitive to moisture. \nScribes and tanners valued them for their ability to react chemically with tannic acids, instantly turning pale liquids into rich, permanent black dyes and inks.","craftingDescription":"An alchemist can produce about 5lbs of Green Vitriol Crystals from one 30lb heap of Iron Pyrite in four batches, over the course of about 3.5 years or 42 months. Batch one takes 6 months, batch 2 9 months, batch 3 12 months and batch 4 15 months. Spending just under 21 days physically working on the production.\nThe alchemist lays out 30 lbs of raw, golden iron pyrite chunks into an open-air, clay-lined wooden trough. Over the course of 6 to 15 months, rain and oxygen slowly break the rocks down from the outside in. This weathering bleeds out a highly acidic, greenish-brown liquid that trickles down into a collection pot.\nBecause the collected liquid is far too acidic to form stable crystals, the alchemist pours it into a lead vat and tosses in 15 iron horseshoe nails. A bubbling reaction occurs as the iron digests the excess acid, perfectly neutralizing and chemical-enriching the fluid.\nThe alchemist brings the neutralized liquid to a steady, rolling boil over a roaring furnace fire for 24 continuous hours. This evaporates the water and concentrates the liquid into a dense, thick chemical syrup.\nThe piping-hot syrup is poured into large wooden tubs where strings or wooden sticks are hung. As the mixture sits undisturbed in a cool room for two weeks, beautiful sea-green vitriol crystals slowly grow along the strings. The alchemist then scrapes them off, dries them thoroughly, and wraps them in tight leather pouches to prevent them from turning into sludge."},{"id":65,"name":"Nail - Horseshoe","categoryId":11,"isMagic":false,"weightLbs":1,"minSaleQty":10,"saleUnitId":1,"baseMeasureQty":100,"markupAmount":0,"description":"These are slender, highly specialized nails featuring a distinct, flat, wedge-shaped head that fits flush into the grooves of a horseshoe. Blacksmiths hand-forged them from soft iron so they could bend easily when driven into a horse\u2019s hoof without splitting the wall.","craftingDescription":"A skilled blacksmith can hand forge a batch of nails in just under an hour. The size of the nail dictates the quantity in the batch.\nHorseshoe Nail 100/lb\nLath/Shingle Nail 80/lb\nTimber /Board Nail 50/lb"},{"id":66,"name":"Nail - Lath/Shingle","categoryId":11,"isMagic":false,"weightLbs":1,"minSaleQty":8,"saleUnitId":1,"baseMeasureQty":80,"markupAmount":0,"description":"Small, thin, and mass-produced, these everyday fasteners feature a sharp point and a wide, flat head. Carpenters and roofers used them by the thousands to pin thin wooden laths to walls (for plastering) or to secure oak shingles to roofs. Because they were thin, they could be driven into green wood rapidly without cracking the slats","craftingDescription":"A skilled blacksmith can hand forge a batch of nails in just under an hour. The size of the nail dictates the quantity in the batch.\nHorseshoe Nail 100/lb\nLath/Shingle Nail 80/lb\nTimber /Board Nail 50/lb"},{"id":67,"name":"Nail - Timber/Board","categoryId":11,"isMagic":false,"weightLbs":1,"minSaleQty":5,"saleUnitId":1,"baseMeasureQty":50,"markupAmount":0,"description":"Thick and sturdy, these square-shanked fasteners feature rough, rosehead heads hammered out with heavy blows. They were the workhorses of medieval framing, used by carpenters to fasten thick floorboards, heavy doors, and structural braces into the oak frames of houses and barns.","craftingDescription":"A skilled blacksmith can hand forge a batch of nails in just under an hour. The size of the nail dictates the quantity in the batch.\nHorseshoe Nail 100/lb\nLath/Shingle Nail 80/lb\nTimber /Board Nail 50/lb"},{"id":68,"name":"Oak Galls","categoryId":1,"isMagic":false,"weightLbs":0.5,"minSaleQty":80,"saleUnitId":1,"baseMeasureQty":80,"markupAmount":0,"description":"These strange, nut-like growths are found on oak trees. They is not part of the tree itself. Instead, they are a tiny nursery created by a harmless wasp (often called a gall wasp). The wasp lays an egg in the tree's twig or leaf. The tree gets irritated by the egg and grows a hard, round ball around it to protect itself. Inside this ball, the wasp larva eats, grows, and eventually chews its way out.\nOak galls have been prized for thousands of years because they are packed with tannin. This chemical is used to make deep black, permanent ink (called iron gall ink) and to tan leather.","craftingDescription":"It takes about 2.5 hours to gather 80 galls ( about 1/2lb)"}],"components":[{"id":2,"parentItemId":2,"componentItemId":1,"quantity":200},{"id":3,"parentItemId":10,"componentItemId      state   = active world's data object

   schedule a background write a moment later. */

const DB_NAME = 'itemLedgerDB';
const DB_VERSION = 1;
const STORE_WORLDS = 'worlds';
const STORE_META = 'meta';
const LEGACY_LS_LIBRARY = 'itemLedgerLibrary_v2';
const LEGACY_LS_SINGLE = 'itemLedgerData_v1';

let _db = null;
let library = { activeWorldId: null, worlds: [] };
let state = null;
let currentItemId = null;

function blankWorldData() {
  return { items: [], components: [], professions: [], skillLevels: [], categories: [], saleUnits: [], itemProfessions: [], categoryGroups: [] };
}
function makeWorld(name, data) {
  return { id: 'w' + Date.now() + Math.floor(Math.random() * 100000), name: name, data: data };
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_WORLDS)) db.createObjectStore(STORE_WORLDS, { keyPath: 'id' });
      if (!db.objectStoreNames.contains(STORE_META)) db.createObjectStore(STORE_META, { keyPath: 'key' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

function idbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbPut(storeName, value) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(value);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
function idbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = _db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function initStorage() {
  _db = await openDB();
  let worlds = await idbGetAll(STORE_WORLDS);
  let meta = await idbGet(STORE_META, 'activeWorldId');

  if (!worlds || worlds.length === 0) {
    // Migrate from localStorage if a previous version stored data there
    const migrated = tryMigrateFromLocalStorage();
    if (migrated) {
      for (const w of migrated.worlds) await idbPut(STORE_WORLDS, w);
      await idbPut(STORE_META, { key: 'activeWorldId', value: migrated.activeWorldId });
      worlds = migrated.worlds;
      meta = { key: 'activeWorldId', value: migrated.activeWorldId };
    } else {
      // First run ever: seed world
      const w = makeWorld('My World', JSON.parse(JSON.stringify(SEED_DATA)));
      await idbPut(STORE_WORLDS, w);
      await idbPut(STORE_META, { key: 'activeWorldId', value: w.id });
      worlds = [w];
      meta = { key: 'activeWorldId', value: w.id };
    }
  }

  library.worlds = worlds;
  library.activeWorldId = (meta && meta.value && worlds.find(w => w.id === meta.value)) ? meta.value : worlds[0].id;
  setActiveWorldInMemory(library.activeWorldId);
}

function tryMigrateFromLocalStorage() {
  try {
    const libRaw = localStorage.getItem(LEGACY_LS_LIBRARY);
    if (libRaw) {
      const lib = JSON.parse(libRaw);
      if (lib && Array.isArray(lib.worlds) && lib.worlds.length) return lib;
    }
  } catch (e) { /* ignore */ }
  try {
    const single = localStorage.getItem(LEGACY_LS_SINGLE);
    if (single) {
      const data = JSON.parse(single);
      const w = makeWorld('My World', data);
      return { activeWorldId: w.id, worlds: [w] };
    }
  } catch (e) { /* ignore */ }
  return null;
}

function setActiveWorldInMemory(worldId) {
  const w = library.worlds.find(x => x.id === worldId) || library.worlds[0];
  library.activeWorldId = w.id;
  state = w.data;
  // Backward-compat: older worlds may lack category groups
  if (!Array.isArray(state.categoryGroups)) state.categoryGroups = [];
  for (const c of state.categories) { if (!('groupId' in c)) c.groupId = null; }
  currentItemId = state.items.length ? state.items[0].id : null;
  invalidateParentIndex();
  rebuildCalcCache();
}

function activeWorld() {
  return library.worlds.find(w => w.id === library.activeWorldId) || library.worlds[0];
}

/* ---- Debounced persistence of the active world ---- */
let _saveTimer = null;
let _savePending = false;
function saveState() {
  // mark cache dirty handled by callers via invalidate; here we just persist
  _savePending = true;
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(flushSave, 400);
}
async function flushSave() {
  if (!_savePending) return;
  _savePending = false;
  const w = activeWorld();
  try {
    await idbPut(STORE_WORLDS, w);
    await idbPut(STORE_META, { key: 'activeWorldId', value: library.activeWorldId });
  } catch (e) {
    console.error('Save failed:', e);
    _savePending = true; // retry on next tick
  }
}
// Best-effort flush if the page is closing
window.addEventListener('beforeunload', () => { if (_savePending) { try { /* sync best-effort */ flushSave(); } catch (e) {} } });

/* ---- World management (async where they persist) ---- */
async function switchWorld(worldId) {
  setActiveWorldInMemory(worldId);
  await idbPut(STORE_META, { key: 'activeWorldId', value: library.activeWorldId });
}
async function createWorld(name, data) {
  const w = makeWorld(name || 'Untitled World', data || blankWorldData());
  library.worlds.push(w);
  setActiveWorldInMemory(w.id);
  await idbPut(STORE_WORLDS, w);
  await idbPut(STORE_META, { key: 'activeWorldId', value: library.activeWorldId });
  return w;
}
async function duplicateWorld(worldId) {
  const src = library.worlds.find(x => x.id === worldId);
  if (!src) return;
  const copy = makeWorld(src.name + ' (copy)', JSON.parse(JSON.stringify(src.data)));
  library.worlds.push(copy);
  await idbPut(STORE_WORLDS, copy);
  return copy;
}
async function renameWorld(worldId, newName) {
  const w = library.worlds.find(x => x.id === worldId);
  if (w) { w.name = newName; await idbPut(STORE_WORLDS, w); }
}
async function deleteWorld(worldId) {
  if (library.worlds.length <= 1) return false;
  library.worlds = library.worlds.filter(x => x.id !== worldId);
  await idbDelete(STORE_WORLDS, worldId);
  if (library.activeWorldId === worldId) {
    setActiveWorldInMemory(library.worlds[0].id);
    await idbPut(STORE_META, { key: 'activeWorldId', value: library.activeWorldId });
  }
  return true;
}

/* ===================== Lookups ===================== */
function getItem(id) { return state.items.find(i => i.id === id); }
function getProfession(id) { return state.professions.find(p => p.id === id); }
function getSkillLevel(id) { return state.skillLevels.find(s => s.id === id); }
function getSaleUnit(id) { return state.saleUnits.find(s => s.id === id); }
function getCategory(id) { return state.categories.find(c => c.id === id); }
function getCategoryGroup(id) { return (state.categoryGroups || []).find(g => g.id === id); }
function componentsOf(itemId) { return state.components.filter(c => c.parentItemId === itemId); }
function professionsOf(itemId) { return state.itemProfessions.filter(ip => ip.itemId === itemId); }
function usedAsComponentElsewhere(itemId) { return state.components.filter(c => c.componentItemId === itemId); }
function nextId(arr) { return arr.reduce((m, x) => Math.max(m, x.id), 0) + 1; }

/* ===================== Cached + incremental calculation engine =====================
   calcResultCache: Map(itemId -> result object), holds the live value of every
   item. rebuildCalcCache() does a full pass (used on load / world switch /
   structural edits). recalcFrom(itemId) recomputes just that item and everything
   that depends on it (its ancestors in the component graph), used for fast inline
   edits. Both produce identical results - verified against the simple engine. */

let calcResultCache = new Map();

function computeItem(itemId, cache, visiting) {
  const empty = { materialsTotal: 0, labourTotal: 0, totalCost: 0, itemValue: 0, catalogueValue: 0, catalogueWeight: 0, circular: false };
  if (visiting.has(itemId)) return { ...empty, circular: true };
  const item = getItem(itemId);
  if (!item) return empty;

  visiting.add(itemId);

  let labourTotal = 0;
  for (const ip of professionsOf(itemId)) {
    const prof = getProfession(ip.professionId);
    const sk = prof ? getSkillLevel(prof.skillLevelId) : null;
    const dayRate = sk ? (sk.dayRate || 0) : 0;
    labourTotal += (ip.numWorkers || 0) * (ip.craftingDays || 0) * dayRate;
  }

  let materialsTotal = 0;
  let anyCircular = false;
  for (const c of componentsOf(itemId)) {
    let compResult = cache.get(c.componentItemId);
    if (!compResult) compResult = computeItem(c.componentItemId, cache, visiting);
    if (compResult.circular) anyCircular = true;
    materialsTotal += (c.quantity || 0) * (compResult.catalogueValue || 0);
  }

  const totalCost = materialsTotal + labourTotal;
  const itemValue = round4(totalCost + (item.markupAmount || 0));

  const su = getSaleUnit(item.saleUnitId);
  const unitType = su ? (su.type || '').toLowerCase() : '';
  const weight = item.weightLbs || 0;
  const minQty = item.minSaleQty || 0;
  const baseQty = item.baseMeasureQty || 0;

  let catalogueValue = 0, catalogueWeight = 0;
  if (unitType === 'weight') {
    catalogueWeight = minQty;
    catalogueValue = weight === 0 ? 0 : itemValue * (minQty / weight);
  } else if (unitType === 'count' || unitType === 'measure') {
    catalogueWeight = baseQty === 0 ? 0 : weight * (minQty / baseQty);
    catalogueValue = baseQty === 0 ? 0 : itemValue * (minQty / baseQty);
  }
  // Round to 4dp so the displayed per-unit value is exactly what gets used
  // when this item is a component elsewhere (values always reconcile by hand).
  catalogueValue = round4(catalogueValue);

  const result = { materialsTotal: round4(materialsTotal), labourTotal: round4(labourTotal), totalCost: round4(totalCost), itemValue, catalogueValue, catalogueWeight, circular: anyCircular };
  visiting.delete(itemId);
  cache.set(itemId, result);
  return result;
}

function rebuildCalcCache() {
  calcResultCache = new Map();
  for (const it of state.items) {
    if (!calcResultCache.has(it.id)) computeItem(it.id, calcResultCache, new Set());
  }
  return calcResultCache;
}

/* Build a reverse dependency index: for a given item, who uses it as a component
   (directly)? Cached and only rebuilt when the component graph changes
   (add/remove item or link), so repeated inline edits stay fast even on very
   large datasets. */
let _parentIndex = null;
function buildParentIndex() {
  if (_parentIndex) return _parentIndex;
  const idx = new Map(); // childId -> Set(parentId)
  for (const c of state.components) {
    if (!idx.has(c.componentItemId)) idx.set(c.componentItemId, new Set());
    idx.get(c.componentItemId).add(c.parentItemId);
  }
  _parentIndex = idx;
  return idx;
}
function invalidateParentIndex() { _parentIndex = null; }

/* Recompute itemId and every ancestor that (transitively) depends on it.
   Returns the set of affected item ids. */
function recalcFrom(itemId) {
  const parentIdx = buildParentIndex();
  // Collect itemId + all ancestors (items that use it up the chain)
  const affected = new Set();
  const stack = [itemId];
  while (stack.length) {
    const cur = stack.pop();
    if (affected.has(cur)) continue;
    affected.add(cur);
    const parents = parentIdx.get(cur);
    if (parents) for (const p of parents) stack.push(p);
  }
  // Recompute affected items. Clear their cache entries first, then compute.
  for (const id of affected) calcResultCache.delete(id);
  for (const id of affected) {
    if (!calcResultCache.has(id)) computeItem(id, calcResultCache, new Set());
  }
  return affected;
}

/* When the change is structural or global (skill rates, professions, sale units,
   adding/removing items or links, world switch) we can't cheaply scope it, so we
   rebuild everything. Still fast well into the thousands. */
function invalidateAll() { invalidateParentIndex(); rebuildCalcCache(); }

/* Compatibility shim: existing render code calls calcAll() and reads the Map.
   We just return the live cache (rebuilding only if empty). */
function calcAll() {
  if (calcResultCache.size === 0 && state.items.length) rebuildCalcCache();
  return calcResultCache;
}

function wouldCreateCycle(parentId, candidateComponentId) {
  if (parentId === candidateComponentId) return true;
  const stack = [candidateComponentId];
  const seen = new Set();
  while (stack.length) {
    const cur = stack.pop();
    if (cur === parentId) return true;
    if (seen.has(cur)) continue;
    seen.add(cur);
    for (const c of componentsOf(cur)) stack.push(c.componentItemId);
  }
  return false;
}

/* ===================== Formatting ===================== */
function round4(v) {
  // Round to 4 decimal places, guarding against binary-float artefacts.
  return Math.round((Number(v) + Number.EPSILON) * 10000) / 10000;
}
function fmtCurrency(v) {
  const n = Number(v) || 0;
  const sign = n < 0 ? '-' : '';
  return sign + '\u20B2' + Math.abs(n).toFixed(4);
}
function fmtCurrency2(v) {
  const n = Number(v) || 0;
  const sign = n < 0 ? '-' : '';
  return sign + '\u20B2' + Math.abs(n).toFixed(2);
}
function fmtNum(v) { return (Number(v) || 0).toFixed(4); }
function flashEl(el) { el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }

</script>
<script>
/* ===================== Screen router ===================== */
let currentScreen = 'home';
let selectedItemId = null;   // highlighted row on the list page
let draftItem = null;        // working copy while editing (null when not editing)
let draftIsNew = false;

function navigate(screen) {
  currentScreen = screen;
  // Push a history entry so the device Back button steps through screens
  // rather than immediately leaving the app.
  try { history.pushState({ screen: screen }, ''); } catch (e) { /* ignore */ }
  render();
}

// Back button: if we're not on the home screen, intercept and go home/back a
// step instead of exiting. On home, let the default happen (leave the app).
window.addEventListener('popstate', function (e) {
  if (currentScreen === 'editor' && draftItem) {
    // leaving the editor via Back behaves like Cancel (with confirm)
    if (confirm('Discard changes and return to the list?')) {
      draftItem = null; draftIsNew = false; currentScreen = 'catalogue';
      try { history.pushState({ screen: 'catalogue' }, ''); } catch (_) {}
      render();
    } else {
      // user cancelled the back: re-push so we stay put
      try { history.pushState({ screen: 'editor' }, ''); } catch (_) {}
    }
    return;
  }
  if (currentScreen !== 'home') {
    currentScreen = 'home';
    try { history.pushState({ screen: 'home' }, ''); } catch (_) {}
    render();
  }
  // if already home, do nothing special (default browser/app behaviour)
});

function render() {
  const app = document.getElementById('appRoot');
  renderTopBar();
  switch (currentScreen) {
    case 'home': renderHome(app); break;
    case 'catalogue': renderCatalogue(app); break;
    case 'editor': renderEditorPage(app); break;
    case 'professions': renderProfessionsScreen(app); break;
    case 'skillLevels': renderSkillLevelsScreen(app); break;
    case 'categories': renderCategoriesScreen(app); break;
    case 'categoryGroups': renderCategoryGroupsScreen(app); break;
    case 'saleUnits': renderSaleUnitsScreen(app); break;
    default: renderHome(app);
  }
}

/* ===================== Top bar + world selector ===================== */
function renderTopBar() {
  const bar = document.getElementById('worldBar');
  const opts = library.worlds.map(w =>
    `<option value="${w.id}" ${w.id === library.activeWorldId ? 'selected' : ''}>${escapeHtml(w.name)}</option>`
  ).join('');
  bar.innerHTML = `
    <label class="world-label">World</label>
    <select id="worldSelect">${opts}</select>
    <button class="btn btn-ghost btn-sm" id="worldManageBtn">Manage worlds\u2026</button>
  `;
  document.getElementById('worldSelect').addEventListener('change', async e => {
    await switchWorld(e.target.value);
    render();
  });
  document.getElementById('worldManageBtn').addEventListener('click', openWorldManager);
}

/* ===================== Home screen ===================== */
function renderHome(app) {
  const aw = activeWorld();
  const counts = {
    items: state.items.length, professions: state.professions.length,
    skillLevels: state.skillLevels.length, categories: state.categories.length,
    saleUnits: state.saleUnits.length
  };
  app.innerHTML = `
    <div class="home-wrap">
      <div class="home-head">
        <h2>${escapeHtml(aw.name)}</h2>
        <p class="home-sub">Choose a register to work in. Everything below belongs to this world.</p>
      </div>
      <div class="tile-grid">
        ${tile('catalogue', 'Item Catalogue', 'Create and price items, components and labour', counts.items + ' items')}
        ${tile('professions', 'Professions', 'Trades and the skill level each one works at', counts.professions + ' professions')}
        ${tile('skillLevels', 'Skill Levels', 'Day rates that drive every labour cost', counts.skillLevels + ' levels')}
        ${tile('categories', 'Categories', 'How items are grouped in the catalogue', counts.categories + ' categories')}
        ${tile('categoryGroups', 'Category Groups', 'Optional higher tier grouping categories together', (state.categoryGroups || []).length + ' groups')}
        ${tile('saleUnits', 'Sale Units', 'Units items are sold by, and how they price', counts.saleUnits + ' units')}
      </div>
      <div class="home-foot">
        <button class="btn btn-ghost btn-sm" id="homeExportBtn">Export this world\u2026</button>
        <button class="btn btn-ghost btn-sm" id="homeImportBtn">Import a world\u2026</button>
        <span class="home-foot-note">Worlds are stored in this browser. Export regularly to keep a backup and to move a world to another device.</span>
      </div>
    </div>
  `;
  app.querySelectorAll('[data-tile]').forEach(t => t.addEventListener('click', () => navigate(t.dataset.tile)));
  document.getElementById('homeExportBtn').addEventListener('click', () => exportWorld(library.activeWorldId));
  document.getElementById('homeImportBtn').addEventListener('click', () => triggerImport('newWorld'));
}

function tile(screen, title, desc, stat) {
  return `<button class="tile" data-tile="${screen}">
      <span class="tile-title">${title}</span>
      <span class="tile-desc">${desc}</span>
      <span class="tile-stat">${stat}</span>
    </button>`;
}

function backBar(title) {
  return `<div class="screen-head">
      <button class="btn btn-ghost btn-sm" id="backHomeBtn">\u2190 Home</button>
      <h2>${escapeHtml(title)}</h2>
    </div>`;
}
function wireBack() {
  const b = document.getElementById('backHomeBtn');
  if (b) b.addEventListener('click', () => navigate('home'));
}

/* ===================== Item Catalogue (list page) ===================== */
function renderCatalogue(app) {
  // Sub-table edits (skill rates, professions, etc.) may have changed global
  // values while we were away; ensure the cache reflects the current data.
  invalidateAll();
  if (!getItem(selectedItemId)) selectedItemId = null;
  app.innerHTML = `
    ${backBar('Item Catalogue')}
    <div class="list-page">
      <div class="list-toolbar">
        <input type="text" id="searchInput" class="list-search" placeholder="Search items\u2026" />
        <div class="list-toolbar-actions">
          <button class="btn btn-brass" id="addItemBtn">+ Add item</button>
          <button class="btn" id="editItemBtn" disabled>Edit</button>
          <button class="btn btn-wax" id="deleteItemBtn" disabled>Delete</button>
        </div>
      </div>
      <div class="list-table-wrap" id="listTableWrap"></div>
    </div>
  `;
  wireBack();
  document.getElementById('searchInput').addEventListener('input', renderItemList);
  document.getElementById('addItemBtn').addEventListener('click', openNewItemEditor);
  document.getElementById('editItemBtn').addEventListener('click', () => { if (selectedItemId != null) openEditItemEditor(selectedItemId); });
  document.getElementById('deleteItemBtn').addEventListener('click', () => { if (selectedItemId != null) deleteItemFromList(selectedItemId); });
  renderItemList();
}

function updateListToolbarButtons() {
  const has = selectedItemId != null && !!getItem(selectedItemId);
  const edit = document.getElementById('editItemBtn');
  const del = document.getElementById('deleteItemBtn');
  if (edit) edit.disabled = !has;
  if (del) del.disabled = !has;
}

let collapsedCategories = new Set();  // category names currently collapsed
let collapsedGroups = new Set();      // group keys currently collapsed

function renderItemList() {
  const wrap = document.getElementById('listTableWrap');
  if (!wrap) return;
  const searchEl = document.getElementById('searchInput');
  const search = searchEl ? searchEl.value.trim().toLowerCase() : '';
  const memo = calcAll();
  const searching = search.length > 0;

  // Bucket items by category
  const itemsByCat = new Map();
  for (const it of state.items) {
    if (search && !it.name.toLowerCase().includes(search)) continue;
    const catId = it.categoryId;
    if (!itemsByCat.has(catId)) itemsByCat.set(catId, []);
    itemsByCat.get(catId).push(it);
  }
  if (itemsByCat.size === 0) {
    wrap.innerHTML = `<div class="empty-state">${searching ? 'No items match your search.' : 'No items yet. Use \u201c+ Add item\u201d to create your first one.'}</div>`;
    updateListToolbarButtons();
    return;
  }

  // Organise categories under their group (or ungrouped)
  // Build: groupKey -> { name, cats: [catId...] }; ungrouped uses key '__none__'
  const groups = (state.categoryGroups || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  const catsById = new Map(state.categories.map(c => [c.id, c]));

  // Determine ordering: each group (alpha), each containing its categories (alpha);
  // then ungrouped categories (alpha); then an "Uncategorised" bucket for items with no/unknown category.
  const sections = []; // {type:'group'|'loose', groupId, name, cats:[catId]}
  for (const g of groups) {
    const cats = state.categories.filter(c => c.groupId === g.id)
      .filter(c => itemsByCat.has(c.id))   // only show cats that have (matching) items
      .sort((a, b) => a.name.localeCompare(b.name))
      .map(c => c.id);
    if (cats.length) sections.push({ type: 'group', groupId: g.id, name: g.name, cats });
  }
  // ungrouped categories (groupId null/undefined) that have items
  const looseCats = state.categories.filter(c => c.groupId == null && itemsByCat.has(c.id))
    .sort((a, b) => a.name.localeCompare(b.name)).map(c => c.id);
  // items whose category is missing entirely
  const orphanItems = itemsByCat.get(undefined) || itemsByCat.get(null) || [];

  let html = `<table class="list-table">
    <thead><tr>
      <th>Description</th><th>Unit</th><th class="num">Value (\u20B2.\uFE69\u00a2)</th><th class="num">Weight</th>
    </tr></thead><tbody>`;

  const renderCatBlock = (catId, indented) => {
    const cat = catsById.get(catId);
    const catName = cat ? cat.name : 'Uncategorised';
    const items = (itemsByCat.get(catId) || []).slice().sort((a, b) => a.name.localeCompare(b.name));
    const catKey = 'cat:' + catId;
    const isCollapsed = !searching && collapsedCategories.has(catKey);
    html += `<tr class="list-cat-row"><td colspan="4">
      <button class="list-cat-toggle${isCollapsed ? ' collapsed' : ''}${indented ? ' indented' : ''}" data-cat-toggle="${escapeHtmlAttr(catKey)}">
        <span class="list-cat-caret">\u25be</span>
        <span>${escapeHtml(catName)}</span>
        <span class="list-cat-count">(${items.length})</span>
      </button>
    </td></tr>`;
    if (isCollapsed) return;
    for (const it of items) {
      const su = getSaleUnit(it.saleUnitId);
      const res = memo.get(it.id) || { catalogueValue: 0, catalogueWeight: 0 };
      const sel = it.id === selectedItemId ? ' selected' : '';
      const unitName = su ? su.name : '\u2014';
      const mq = it.minSaleQty || 0;
      // catalogueValue already represents the price of a full minimum-sale lot.
      // Always show "N × unit" so the display reads consistently (e.g. "1 × bundle").
      const unitLabel = su ? `${(+mq.toFixed(4))} \u00d7 ${escapeHtml(unitName)}` : escapeHtml(unitName);
      html += `<tr class="list-row${sel}${indented ? ' indented' : ''}" data-item-row="${it.id}">
        <td class="lr-name">${escapeHtml(it.name)}${it.isStub ? ' <span class="stub-tag">incomplete</span>' : ''}</td>
        <td class="lr-unit">${unitLabel}</td>
        <td class="num lr-value">\u20B2${(Number(res.catalogueValue) || 0).toFixed(2)}</td>
        <td class="num lr-weight">${(Number(res.catalogueWeight) || 0).toFixed(2)}</td>
      </tr>`;
    }
  };

  // Grouped sections
  for (const sec of sections) {
    const groupKey = 'grp:' + sec.groupId;
    const isGroupCollapsed = !searching && collapsedGroups.has(groupKey);
    const totalItems = sec.cats.reduce((n, cid) => n + (itemsByCat.get(cid) || []).length, 0);
    html += `<tr class="list-group-row"><td colspan="4">
      <button class="list-group-toggle${isGroupCollapsed ? ' collapsed' : ''}" data-group-toggle="${escapeHtmlAttr(groupKey)}">
        <span class="list-cat-caret">\u25be</span>
        <span>${escapeHtml(sec.name)}</span>
        <span class="list-cat-count">(${totalItems})</span>
      </button>
    </td></tr>`;
    if (isGroupCollapsed) continue;
    for (const cid of sec.cats) renderCatBlock(cid, true);
  }
  // Loose (ungrouped) categories at top level
  for (const cid of looseCats) renderCatBlock(cid, false);
  // Orphan items (no category)
  if (orphanItems.length) renderCatBlock(undefined, false);

  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('[data-group-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.groupToggle;
      if (collapsedGroups.has(k)) collapsedGroups.delete(k); else collapsedGroups.add(k);
      renderItemList();
    });
  });
  wrap.querySelectorAll('[data-cat-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.catToggle;
      if (collapsedCategories.has(k)) collapsedCategories.delete(k); else collapsedCategories.add(k);
      renderItemList();
    });
  });
  wrap.querySelectorAll('[data-item-row]').forEach(tr => {
    const id = Number(tr.dataset.itemRow);
    tr.addEventListener('click', () => {
      selectedItemId = id;
      wrap.querySelectorAll('.list-row.selected').forEach(r => r.classList.remove('selected'));
      tr.classList.add('selected');
      updateListToolbarButtons();
    });
    tr.addEventListener('dblclick', () => openEditItemEditor(id));
  });
  updateListToolbarButtons();
}

function deleteItemFromList(id) {
  const item = getItem(id);
  if (!item) return;
  const usedIn = usedAsComponentElsewhere(item.id);
  let msg = `Delete "${item.name}"? This also removes its component and labour links.`;
  if (usedIn.length) {
    const parentNames = usedIn.map(c => (getItem(c.parentItemId) || {}).name || '?').join(', ');
    msg += `\n\nWarning: this item is used as a component in: ${parentNames}. Those links will be removed too.`;
  }
  if (!confirm(msg)) return;
  state.components = state.components.filter(c => c.parentItemId !== item.id && c.componentItemId !== item.id);
  state.itemProfessions = state.itemProfessions.filter(ip => ip.itemId !== item.id);
  state.items = state.items.filter(i => i.id !== item.id);
  selectedItemId = null;
  invalidateAll();
  saveState();
  renderItemList();
}

        <button class="btn btn-sm" data-world-rename="${w.id}">Rename</button>
        <button class="btn btn-sm" data-world-dupe="${w.id}">Duplicate</button>
        <button class="btn btn-sm" data-world-export="${w.id}">Export</button>
        <button class="btn btn-wax btn-sm" data-world-delete="${w.id}" ${library.worlds.length <= 1 ? 'disabled' : ''}>Delete</button>
      </td>
    </tr>`;
  }).join('');
  openDialog('Manage worlds', `
    <p class="dlg-hint">Each world is a separate, self-contained dataset. Switching is instant. All worlds live in this browser \u2014 export any world to keep a backup or move it to another device.</p>
    <table class="data-table world-table"><tbody>${rows}</tbody></table>
    <div class="world-add-row">
      <button class="btn btn-moss btn-sm" id="worldNewBlank">+ New empty world</button>
      <button class="btn btn-moss btn-sm" id="worldImportNew">Import world from file\u2026</button>
    </div>
  `, null, { wide: true, hideSave: true });

  const dlg = document.getElementById('dialogBody');
  dlg.querySelectorAll('[data-world-switch]').forEach(b => b.addEventListener('click', async () => { await switchWorld(b.dataset.worldSwitch); closeDialog(); currentScreen = 'home'; render(); }));
  dlg.querySelectorAll('[data-world-rename]').forEach(b => b.addEventListener('click', async () => {
    const w = library.worlds.find(x => x.id === b.dataset.worldRename);
    const name = prompt('Rename world:', w.name);
    if (name && name.trim()) { await renameWorld(w.id, name.trim()); openWorldManager(); }
  }));
  dlg.querySelectorAll('[data-world-dupe]').forEach(b => b.addEventListener('click', async () => { await duplicateWorld(b.dataset.worldDupe); openWorldManager(); }));
  dlg.querySelectorAll('[data-world-export]').forEach(b => b.addEventListener('click', () => exportWorld(b.dataset.worldExport)));

      if (currentScreen !== 'home') currentScreen = 'home';
      openWorldManager();
    }
  }));
  document.getElementById('worldNewBlank').addEventListener('click', async () => {
    const name = prompt('Name for the new empty world:', 'New World');
    if (name && name.trim()) { await createWorld(name.trim(), blankWorldData()); closeDialog(); currentScreen = 'home'; render(); }
  });
  document.getElementById('worldImportNew').addEventListener('click', () => { closeDialog(); triggerImport('newWorld'); });
}

/* ===================== Export / Import ===================== */
function exportWorld(worldId) {
  const w = library.worlds.find(x => x.id === worldId);
  if (!w) return;
  const payload = { appVersion: 2, exportedAt: new Date().toISOString(), worldName: w.name, data: w.data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safe = w.name.replace(/[^a-z0-9\-_]+/gi, '-').replace(/^-+|-+$/g, '').toLowerCase() || 'world';
  a.href = url;
  a.download = `item-ledger-${safe}-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function triggerImport(mode) {
  document.getElementById('importFileInput').click();
}

function normaliseImportedData(parsed) {
  let data, name;
  if (parsed.data && Array.isArray(parsed.data.items)) { data = parsed.data; name = parsed.worldName || 'Imported World'; }
  else if (Array.isArray(parsed.items)) { data = parsed; name = 'Imported World'; }
  else throw new Error('this does not look like an Item Ledger export file');
  const clean = blankWorldData();
  clean.items = data.items || [];
  clean.components = data.components || [];
  clean.professions = data.professions || [];
  clean.skillLevels = data.skillLevels || [];
  clean.categories = data.categories || [];
  clean.saleUnits = data.saleUnits || [];
  clean.itemProfessions = data.itemProfessions || [];
  clean.categoryGroups = data.categoryGroups || [];
  for (const c of clean.categories) { if (!('groupId' in c)) c.groupId = null; }
  return { data: clean, name };
}

function importDataFromFile(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const { data, name } = normaliseImportedData(parsed);
      const suggested = prompt('Import as a new world named:', name);
      if (suggested === null) return;
      await createWorld(suggested.trim() || name, data);
      currentScreen = 'home';
      render();
      alert('Import complete. The imported world is now active.');
    } catch (err) {
      alert('Could not import this file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

/* ===================== Item editor (separate page, draft model) =====================
   Editing works on a deep-copied draft. Components and labour for the draft are
   held on the draft object itself (draft._components / draft._professions) so the
   live totals can be computed without touching saved state. Nothing is written to
   the world until Save. Cancel/back discards the draft. */

function openNewItemEditor() {

    weightLbs: 0, minSaleQty: 1, saleUnitId: firstUnit ? firstUnit.id : null,

    _components: [],
    _professions: []

}

function openEditItemEditor(id) {

  if (!item) return;
  selectedItemId = id;
  draftIsNew = false;
  draftItem = JSON.parse(JSON.stringify(item));
  // pull this item's component + labour rows into the draft as working copies
  draftItem._components = componentsOf(id).map(c => ({ ...c }));

/* ---- Draft-scoped calculation ----
   We temporarily splice the draft's components/professions into a shadow copy of
   the relevant arrays, compute, then restore. This keeps the existing engine
   intact while letting the draft's unsaved edits drive the live totals. */
function computeDraftResult() {
  const d = draftItem;
  // Build temporary arrays: replace this item's rows with the draft's rows,
  // and (for a new item) include the draft item itself in items.
  const savedItems = state.items;
  const savedComps = state.components;
  const savedProfs = state.itemProfessions;

  const itemsTmp = draftIsNew ? savedItems.concat([d]) : savedItems.map(it => it.id === d.id ? d : it);
  const compsTmp = savedComps.filter(c => c.parentItemId !== d.id).concat(d._components.map(c => ({ ...c, parentItemId: d.id })));
  const profsTmp = savedProfs.filter(ip => ip.itemId !== d.id).concat(d._professions.map(ip => ({ ...ip, itemId: d.id })));

  state.items = itemsTmp;
  state.components = compsTmp;
  state.itemProfessions = profsTmp;
  invalidateParentIndex();
  const memo = rebuildCalcCache();
  const result = memo.get(d.id) || { materialsTotal: 0, labourTotal: 0, totalCost: 0, itemValue: 0, catalogueValue: 0, catalogueWeight: 0 };
  // capture component unit values for the grid (from the same memo)
  const compUnitValues = new Map();
  for (const c of d._components) {
    const r = memo.get(c.componentItemId);
    compUnitValues.set(c.componentItemId, r ? r.catalogueValue : 0);
  }

  // restore
  state.items = savedItems;
  state.components = savedComps;
  state.itemProfessions = savedProfs;
  invalidateParentIndex();
  rebuildCalcCache();

  return { result, compUnitValues };
}
