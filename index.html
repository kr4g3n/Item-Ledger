function saveDraft() {
  const d = draftItem;
  if (!d.name || !d.name.trim()) { alert('Please enter an item name before saving.'); return; }
  d.name = d.name.trim();

  // Strip working fields off the item record
  const components = d._components;
  const professions = d._professions;
  const clean = { ...d };
  delete clean._components;
  delete clean._professions;
  delete clean.isStub; // editing + saving means it's no longer an incomplete stub

  if (draftIsNew) {
    state.items.push(clean);
  } else {
    const idx = state.items.findIndex(i => i.id === d.id);
    if (idx >= 0) state.items[idx] = clean; else state.items.push(clean);
  }

  // Replace this item's component rows with the draft's, assigning fresh ids
  state.components = state.components.filter(c => c.parentItemId !== d.id);
  for (const c of components) {
    state.components.push({
      id: nextId(state.components),
      parentItemId: d.id,
      componentItemId: c.componentItemId,
      quantity: c.quantity || 0
    });
  }
  // Same for labour rows
  state.itemProfessions = state.itemProfessions.filter(ip => ip.itemId !== d.id);
  for (const ip of professions) {
    state.itemProfessions.push({
      id: nextId(state.itemProfessions),
      itemId: d.id,
      professionId: ip.professionId,
      numWorkers: ip.numWorkers || 0,
      craftingDays: ip.craftingDays || 0
    });
  }

  selectedItemId = d.id;
  draftItem = null;
  draftIsNew = false;
  invalidateAll();
  saveState();
  navigate('catalogue');
}

/* ---- Draft components grid ---- */
function renderDraftComponentsGrid() {
  const wrap = document.getElementById('componentsGridWrap');
  if (!wrap) return;
  const rows = draftItem._components;
  if (rows.length === 0) { wrap.innerHTML = '<p style="color:var(--ink-faint);font-size:13px;margin:4px 0;">No components yet.</p>'; return; }
  const { compUnitValues } = computeDraftResult();
  let html = `<table class="grid-table"><thead><tr>
      <th>Component</th><th class="num">Unit value</th><th class="num">Qty</th><th class="num">Cost</th><th></th>
    </tr></thead><tbody>`;
  rows.forEach((c, idx) => {
    const compItem = getItem(c.componentItemId);
    const unitVal = compUnitValues.get(c.componentItemId) || 0;
    const lineCost = (c.quantity || 0) * unitVal;
    html += `<tr>
      <td class="row-name">${escapeHtml(compItem ? compItem.name : 'Unknown item')}</td>
      <td class="num">${fmtCurrency(unitVal)}</td>
      <td class="num"><input type="number" step="0.0001" value="${fmtNum(c.quantity)}" data-draft-comp-qty="${idx}" /></td>
      <td class="num line-cost">${fmtCurrency(lineCost)}</td>
      <td><button class="row-del" data-draft-comp-del="${idx}" title="Remove">\u00d7</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('[data-draft-comp-qty]').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = Number(e.target.dataset.draftCompQty);
      draftItem._components[idx].quantity = parseFloat(e.target.value) || 0;
      updateDraftTotals();
      // update just this row's line cost without full re-render (keep focus)
      const { compUnitValues } = computeDraftResult();
      const c = draftItem._components[idx];
      const cell = e.target.closest('tr').querySelector('.line-cost');
      if (cell) cell.textContent = fmtCurrency((c.quantity || 0) * (compUnitValues.get(c.componentItemId) || 0));
    });
  });
  wrap.querySelectorAll('[data-draft-comp-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = Number(e.target.dataset.draftCompDel);
      draftItem._components.splice(idx, 1);
      renderDraftComponentsGrid();
      renderDraftAddComponentRow();
      updateDraftTotals();
    });
  });
}

function renderDraftAddComponentRow() {
  const wrap = document.getElementById('addComponentRow');
  if (!wrap) return;
  // Items selectable as components: everything except the draft item itself,
  // and (when editing) anything that would form a cycle.
  const others = state.items.filter(i => i.id !== draftItem.id).slice().sort((a, b) => a.name.localeCompare(b.name));
  const options = others.map(i => `<option value="${i.id}">${escapeHtml(i.name)}${i.isStub ? ' \u00b7 incomplete' : ''}</option>`).join('');
  wrap.innerHTML = `
    <select id="newCompSelect"><option value="__add__">+ Quick-add new item\u2026</option>${options}</select>
    <input type="number" id="newCompQty" step="0.0001" value="1.0000" />
    <button class="btn btn-moss btn-sm" id="newCompAddBtn">+ Add component</button>
    <div class="add-row-error" id="newCompError" style="display:none;"></div>
  `;
  document.getElementById('newCompSelect').addEventListener('change', e => {
    if (e.target.value === '__add__') { e.target.value = ''; quickAddComponentItemInline(); }
  });
  // default to first real item rather than the add-new row
  { const s = document.getElementById('newCompSelect'); if (s && others.length) s.value = String(others[0].id); }
  document.getElementById('newCompAddBtn').addEventListener('click', () => {
    const val = document.getElementById('newCompSelect').value;
    if (val === '__add__' || val === '') return;
    const compId = Number(val);
    const qty = parseFloat(document.getElementById('newCompQty').value) || 0;
    const errEl = document.getElementById('newCompError');
    if (!compId) return;
    if (draftWouldCreateCycle(compId)) {
      errEl.textContent = 'Cannot add: this would create a circular reference (this item already appears in that component\'s own chain).';
      errEl.style.display = 'block'; return;
    }
    if (draftItem._components.some(c => c.componentItemId === compId)) {
      errEl.textContent = 'That item is already a component. Adjust its quantity instead.';
      errEl.style.display = 'block'; return;
    }
    errEl.style.display = 'none';
    draftItem._components.push({ componentItemId: compId, quantity: qty });
    renderDraftComponentsGrid();
    renderDraftAddComponentRow();
    updateDraftTotals();
  });
}

/* Cycle check against saved graph + the draft's current component set */
function draftWouldCreateCycle(candidateComponentId) {
  const did = draftItem.id;
  if (candidateComponentId === did) return true;
  // Walk down from candidate using saved components; if we reach the draft item, cycle.
  const stack = [candidateComponentId];
  const seen = new Set();
  while (stack.length) {
    const cur = stack.pop();
    if (cur === did) return true;
    if (seen.has(cur)) continue;
    seen.add(cur);
    for (const c of componentsOf(cur)) stack.push(c.componentItemId);
  }
  return false;
}

/* ---- Draft labour grid ---- */
function renderDraftProfessionsGrid() {
  const wrap = document.getElementById('professionsGridWrap');
  if (!wrap) return;
  const rows = draftItem._professions;
  if (rows.length === 0) { wrap.innerHTML = '<p style="color:var(--ink-faint);font-size:13px;margin:4px 0;">No labour entries yet.</p>'; return; }
  let html = `<table class="grid-table"><thead><tr>
      <th>Profession</th><th class="num">Day rate</th><th class="num">Workers</th><th class="num">Days</th><th class="num">Cost</th><th></th>
    </tr></thead><tbody>`;
  rows.forEach((ip, idx) => {
    const prof = getProfession(ip.professionId);
    const sk = prof ? getSkillLevel(prof.skillLevelId) : null;
    const dayRate = sk ? (sk.dayRate || 0) : 0;
    const lineCost = (ip.numWorkers || 0) * (ip.craftingDays || 0) * dayRate;
    html += `<tr>
      <td class="row-name">${escapeHtml(prof ? prof.name : 'Unknown profession')}</td>
      <td class="num">${fmtCurrency(dayRate)}</td>
      <td class="num"><input type="number" step="1" value="${ip.numWorkers}" data-draft-prof-workers="${idx}" /></td>
      <td class="num"><input type="number" step="0.0001" value="${fmtNum(ip.craftingDays)}" data-draft-prof-days="${idx}" /></td>
      <td class="num line-cost">${fmtCurrency(lineCost)}</td>
      <td><button class="row-del" data-draft-prof-del="${idx}" title="Remove">\u00d7</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('[data-draft-prof-workers]').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = Number(e.target.dataset.draftProfWorkers);
      draftItem._professions[idx].numWorkers = parseFloat(e.target.value) || 0;
      updateDraftRowLabourCost(e.target.closest('tr'), idx);
      updateDraftTotals();
    });
  });
  wrap.querySelectorAll('[data-draft-prof-days]').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = Number(e.target.dataset.draftProfDays);
      draftItem._professions[idx].craftingDays = parseFloat(e.target.value) || 0;
      updateDraftRowLabourCost(e.target.closest('tr'), idx);
      updateDraftTotals();
    });
  });
  wrap.querySelectorAll('[data-draft-prof-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = Number(e.target.dataset.draftProfDel);
      draftItem._professions.splice(idx, 1);
      renderDraftProfessionsGrid();
      updateDraftTotals();
    });
  });
}

function updateDraftRowLabourCost(tr, idx) {
  const ip = draftItem._professions[idx];
  const prof = getProfession(ip.professionId);
  const sk = prof ? getSkillLevel(prof.skillLevelId) : null;
  const dayRate = sk ? (sk.dayRate || 0) : 0;
  const cell = tr.querySelector('.line-cost');
  if (cell) cell.textContent = fmtCurrency((ip.numWorkers || 0) * (ip.craftingDays || 0) * dayRate);
}

function renderDraftAddProfessionRow() {
  const wrap = document.getElementById('addProfessionRow');
  if (!wrap) return;
  const profs = state.professions.slice().sort((a, b) => a.name.localeCompare(b.name));
  const options = profs.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
  wrap.innerHTML = `
    <select id="newProfSelect"><option value="__add__">+ Add new profession\u2026</option>${options}</select>
    <input type="number" id="newProfWorkers" step="1" value="1" title="Workers" />
    <input type="number" id="newProfDays" step="0.0001" value="1.0000" title="Days" />
    <button class="btn btn-moss btn-sm" id="newProfAddBtn">+ Add labour</button>
  `;
  document.getElementById('newProfSelect').addEventListener('change', e => {
    if (e.target.value === '__add__') { e.target.value = ''; addNewProfessionInline(); }
  });
  { const s = document.getElementById('newProfSelect'); if (s && profs.length) s.value = String(profs[0].id); }
  document.getElementById('newProfAddBtn').addEventListener('click', () => {
    const val = document.getElementById('newProfSelect').value;
    if (val === '__add__' || val === '') return;
    const profId = Number(val);
    const workers = parseFloat(document.getElementById('newProfWorkers').value) || 0;
    const days = parseFloat(document.getElementById('newProfDays').value) || 0;
    if (!profId) return;
    draftItem._professions.push({ professionId: profId, numWorkers: workers, craftingDays: days });
    renderDraftProfessionsGrid();
    updateDraftTotals();
  });
}

function updateDraftTotals() {
  const { result } = computeDraftResult();
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('materialsTotalVal', fmtCurrency(result.materialsTotal));
  set('labourTotalVal', fmtCurrency(result.labourTotal));
  set('totalCostVal', fmtCurrency(result.totalCost));
  set('itemValueVal', fmtCurrency(result.itemValue));
  set('catValueVal', fmtCurrency(result.catalogueValue));
  set('catWeightVal', fmtNum(result.catalogueWeight) + ' lbs');
  const finalEl = document.getElementById('itemValueVal');
  if (finalEl && finalEl.closest('.t-final')) flashEl(finalEl.closest('.t-final'));
}

/* ===================== Utilities ===================== */
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}
function escapeHtmlAttr(s) { return escapeHtml(s); }

/* ===================== Boot ===================== */
async function boot() {
  document.getElementById('importFileInput').addEventListener('change', e => {
    if (e.target.files && e.target.files[0]) importDataFromFile(e.target.files[0]);
    e.target.value = '';
  });
  const appRoot = document.getElementById('appRoot');
  appRoot.innerHTML = '<div class="empty-state">Loading\u2026</div>';
  try {
    await initStorage();
    render();
  } catch (e) {
    console.error(e);
    appRoot.innerHTML = '<div class="empty-state">Could not open local database. If you are in a private/incognito window, try a normal window.</div>';
  }
}
document.addEventListener('DOMContentLoaded', boot);
